<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Inner circle with letter O -->
  <circle cx="256" cy="256" r="140" fill="url(#innerGrad)" opacity="0.9"/>

  <!-- Letter O stylized -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="white" stroke-width="24"/>

  <!-- Small accent - represents "1" concept -->
  <line x1="256" y1="166" x2="256" y2="206" stroke="white" stroke-width="20" stroke-linecap="round"/>

  <!-- Tool indicators - small symbols at corners -->
  <!-- Document symbol (Markdown) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="32" height="40" rx="4" fill="white" opacity="0.8"/>
    <line x1="8" y1="10" x2="24" y2="10" stroke="#3B82F6" stroke-width="3"/>
    <line x1="8" y1="18" x2="20" y2="18" stroke="#3B82F6" stroke-width="3"/>
    <line x1="8" y1="26" x2="24" y2="26" stroke="#3B82F6" stroke-width="3"/>
  </g>

  <!-- Brackets symbol (JSON) -->
  <g transform="translate(400, 80)">
    <text x="0" y="36" font-family="monospace" font-size="36" fill="white" opacity="0.8">{}</text>
  </g>

  <!-- Diff arrows (Text comparison) -->
  <g transform="translate(80, 400)">
    <polygon points="0,12 16,0 16,24" fill="white" opacity="0.8"/>
    <polygon points="32,12 16,0 16,24" fill="white" opacity="0.8"/>
  </g>

  <!-- Clock symbol (Time tool) -->
  <g transform="translate(400, 400)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="4" opacity="0.8"/>
    <line x1="20" y1="20" x2="20" y2="8" stroke="white" stroke-width="3" opacity="0.8"/>
    <line x1="20" y1="20" x2="28" y2="20" stroke="white" stroke-width="3" opacity="0.8"/>
  </g>
</svg>